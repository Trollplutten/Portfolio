<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,900;1,900&family=Syne:wght@800&display=swap" rel="stylesheet">

    <style>
        :root {
            --neon-green: #CCFF00;
            --black: #0a0a0a;
            --white: #ffffff;
            --soft-pink: #f0a6ca;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--black);
            font-family: 'Playfair Display', serif;
            color: var(--white);
            overflow-x: hidden;
        }

        /* Gör så att länkar inte ser ut som klassiska blå länkar */
        a {
            text-decoration: none;
            color: inherit;
            display: block; /* Gör att hela ytan i grid-cellen kan användas */
        }

        /* --- HERO SEKTION --- */
        header.hero {
            background-color: var(--neon-green);
            color: var(--black);
            padding: 100px 20px;
            text-align: center;
            border-bottom: 5px solid var(--black);
        }

        .top-label {
            font-family: 'Syne', sans-serif;
            font-size: 0.7rem;
            letter-spacing: 3px;
            margin-bottom: 20px;
            display: block;
            text-transform: uppercase;
        }

        h1 {
            font-size: clamp(3.5rem, 16vw, 11rem); 
            line-height: 0.8;
            font-style: italic;
            text-transform: none;
            letter-spacing: -2px;
        }

        /* --- GRID LAYOUT --- */
        .portfolio-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-auto-rows: minmax(350px, auto);
        }

        .box {
            border: 1px solid #1a1a1a;
            padding: 40px;
            height: 100%; /* Viktigt för att länken ska fylla ut hela boxen */
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: transform 0.3s ease, background-color 0.3s ease;
            cursor: pointer;
        }

        /* Hover-effekt för att visa att det går att klicka */
        .box:hover {
            filter: brightness(1.1);
            transform: scale(0.98); /* Liten intryckt effekt */
        }

        .span-2 { grid-column: span 2; }
        .span-large { grid-column: span 3; grid-row: span 2; }

        .neon { background-color: var(--neon-green); color: var(--black); }
        .dark { background-color: var(--black); color: var(--white); }
        .pink { background-color: var(--soft-pink); color: var(--black); }

        .box h2 {
            font-size: 3.5rem;
            line-height: 0.85;
            text-transform: uppercase;
        }

        .box p {
            font-family: 'Syne', sans-serif;
            font-size: 0.85rem;
            margin-top: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .vertical {
            writing-mode: vertical-rl;
            text-align: center;
            font-size: 5rem;
            font-weight: 900;
            transform: rotate(180deg);
        }

        /* --- PLACEHOLDER BILD --- */
        .image-box {
            background-image: url('https://images.unsplash.com/photo-1558591710-4b4a1ae0f04d?q=80&w=1000&auto=format&fit=crop'); 
            background-size: cover;
            background-position: center;
            filter: grayscale(100%) contrast(140%);
        }

        /* --- MOBIL --- */
        @media (max-width: 800px) {
            .portfolio-grid { grid-template-columns: 1fr; }
            .span-2, .span-large { grid-column: span 1; }
            h1 { font-size: 4rem; line-height: 0.9; }
            header.hero { padding: 60px 20px; }

        }

        .video-box {
    padding: 0 !important;
    overflow: hidden;
    position: relative;
    background-color: var(--black);
}

.video-box video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    position: absolute;
    top: 0;
    left: 0;
    /* Svartvit effekt med extra tryck i kontrasten */
    filter: grayscale(100%) contrast(140%);
    transition: filter 0.5s ease;
}

/* Videon blir färglagd när man håller musen över */
.video-box:hover video {
    filter: grayscale(0%) contrast(100%);
}

.footer-link {
    display: inline-block !important; /* Gör att de ligger på rad */
    font-family: 'Syne', sans-serif;
    text-transform: uppercase;
    letter-spacing: 2px;
    font-size: 0.9rem;
    transition: color 0.3s ease;
}

.footer-link:hover {
    color: var(--neon-green);
}
    </style>
</head>
